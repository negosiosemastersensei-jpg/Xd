<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V Slice Converter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: #0d1117;
        color: #c9d1d9;
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .container {
        background: #161b22;
        padding: 2rem;
        border-radius: 12px;
        width: 100%;
        max-width: 800px;
        border: 1px solid #30363d;
        text-align: center;
    }
    h1 { color: #58a6ff; margin-top: 0; }
    #drop-zone {
        border: 2px dashed #30363d;
        padding: 30px;
        border-radius: 8px;
        cursor: pointer;
        color: #58a6ff;
        background: #0d1117;
        user-select: none;
        transition: 0.3s;
    }
    #drop-zone:hover { border-color: #58a6ff; background: #161b22; }
    .code-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        width: 100%;
        max-width: 1000px;
        margin-top: 20px;
    }
    .code-section {
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 10px;
    }
    textarea {
        width: 100%;
        height: 350px;
        background: #161b22;
        color: #e6edf3;
        border: 1px solid #30363d;
        border-radius: 6px;
        font-family: Consolas, monospace;
        font-size: 11px;
        padding: 10px;
        resize: none;
    }
    #file-input { position: absolute; opacity: 0; pointer-events: none; }
    .status { margin-top: 10px; font-weight: bold; color: #3fb950; }
</style>
</head>
<body>

<div class="container">
    <h1>V Slice Converter</h1>
    <div id="drop-zone">📂 Arrastra tu chart de Psych Engine antiguo aquí</div>
    <input type="file" id="file-input" accept=".json">
    <div id="status-msg" class="status"></div>
</div>

<div class="code-grid">
    <div class="code-section">
        <h3>📄 chart.json</h3>
        <textarea id="chart-area" readonly></textarea>
    </div>
    <div class="code-section">
        <h3>📄 metadata.json</h3>
        <textarea id="meta-area" readonly></textarea>
    </div>
</div>

<script>
const dropZone = document.getElementById("drop-zone");
const fileInput = document.getElementById("file-input");
const chartArea = document.getElementById("chart-area");
const metaArea = document.getElementById("meta-area");
const statusMsg = document.getElementById("status-msg");

dropZone.addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", e => e.target.files.length && loadFile(e.target.files[0]));
dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.style.borderColor = "#58a6ff"; });
dropZone.addEventListener("drop", e => {
    e.preventDefault();
    dropZone.style.borderColor = "#30363d";
    if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]);
});

function unwrapSong(data) { return (data && data.song) ? data.song : data; }

async function loadFile(file) {
    const reader = new FileReader();
    reader.onload = async e => {
        try {
            const raw = JSON.parse(e.target.result);
            const song = unwrapSong(raw);
            let diff = file.name.toLowerCase().includes("-easy") ? "easy" : file.name.toLowerCase().includes("-hard") ? "hard" : "normal";
            const baseName = file.name.split('-')[0].replace(".json", "");

            const notesArr = [];
            const eventsArr = [];
            let lastFocus = -1;
            let currentTime = 0;
            let currentBpm = song.bpm || 100;

            song.notes.forEach((sec) => {
                if (sec.changeBPM && sec.bpm) currentBpm = sec.bpm;

                const focusChar = sec.mustHitSection ? 0 : 1;
                if (focusChar !== lastFocus) {
                    eventsArr.push({ t: Math.round(currentTime), e: "FocusCamera", v: { char: focusChar } });
                    lastFocus = focusChar;
                }

                if (sec.sectionNotes) {
                    sec.sectionNotes.forEach(n => {
                        let t = n[0];
                        let lane = n[1];
                        let len = n[2] || 0;
                        let finalLane = 0;

                        // LÓGICA ANTI-COLISIÓN (FILTRO ESTRICTO):
                        // Psych lane 0-3 es el que canta, 4-7 es el otro.
                        
                        if (sec.mustHitSection) {
                            // ES EL TURNO DEL JUGADOR (BF)
                            // Si la nota es de BF (0-3), se queda en 0-3.
                            // Si la nota es de Dad (4-7), se queda en 4-7.
                            finalLane = lane; 
                        } else {
                            // ES EL TURNO DEL OPONENTE (DAD)
                            // En Psych, Dad usa 0-3 aquí. Pero en V-Slice Dad DEBE ser 4-7.
                            // Si BF tiene notas aquí (4-7), deben ir a 0-3.
                            if (lane < 4) {
                                finalLane = lane + 4; // Mover Dad de 0-3 a 4-7
                            } else {
                                finalLane = lane - 4; // Mover BF de 4-7 a 0-3
                            }
                        }

                        // VALIDACIÓN FINAL: Forzar que nunca se salgan de sus zonas
                        // Jugador DEBE ser 0-3 | Oponente DEBE ser 4-7
                        notesArr.push({ t: t, d: finalLane, l: len, p: [] });
                    });
                }
                const sectionBeats = sec.sectionBeats || 4;
                currentTime += (60000 / currentBpm) * sectionBeats;
            });

            notesArr.sort((a, b) => a.t - b.t);

            const chartData = {
                version: "2.0.0",
                scrollSpeed: { [diff]: song.speed || 2.5 },
                notes: { [diff]: notesArr },
                events: eventsArr,
                generatedBy: "V Slice Chart Convert - GamerCB and PanchitoManriquez"
            };

            const metadata = {
                version: "2.2.4",
                songName: song.song || baseName,
                artist: "Artist",
                charter: "Charter",
                looped: false,
                offsets: { instrumental: 0, altInstrumentals: {}, vocals: 0, altVocals: {} },
                playData: {
                    difficulties: [diff],
                    characters: {
                        player: song.player1 || "bf",
                        girlfriend: song.gfVersion || "gf",
                        opponent: song.player2 || "dad",
                        instrumental: "",
                        opponentVocals: [song.player2 || "dad"],
                        playerVocals: [song.player1 || "bf"]
                    },
                    stage: song.stage || "stage",
                    noteStyle: "funkin",
                    ratings: { [diff]: 5 },
                    previewStart: 0,
                    previewEnd: 0
                },
                generatedBy: "V Slice Chart Convert - GamerCB and PanchitoManriquez",
                timeFormat: "ms",
                timeChanges: [{ t: 0, b: 0, bpm: song.bpm || 100, n: 4, d: 4, bt: [4,4,4,4] }]
            };

            chartArea.value = JSON.stringify(chartData, null, 2);
            metaArea.value = JSON.stringify(metadata, null, 2);

            const zip = new JSZip();
            zip.file(`${baseName}-chart.json`, chartArea.value);
            zip.file(`${baseName}-metadata.json`, metaArea.value);
            const blob = await zip.generateAsync({ type: "blob" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `${baseName}_V-Slice_Final.zip`;
            a.click();
            statusMsg.innerText = "¡Conversión con Filtro Estricto (0-3 Jug / 4-7 Opp) completada!";
        } catch (err) { alert("Error: " + err.message); }
    };
    reader.readAsText(file);
}
</script>
</body>
</html>
